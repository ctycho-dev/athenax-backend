app = "athenax-backend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"
  COOKIE_SECURE = "true"
  COOKIE_SAMESITE = "none"
  CORS_ORIGIN = "https://www.athenax.co,https://athenax-research.vercel.app,http://localhost:3000"
  FRONTEND_URL = "https://athenax-research.vercel.app"
  # FRONTEND_URL = "https://www.athenax.co"
  ACCESS_TOKEN_EXPIRE_MINUTES = "1440"
  REDIS_USE_IPV6 = "true"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[[services]]
  internal_port = 8000
  protocol = "tcp"
  processes = ["app"]

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.http_checks]]
    interval = "15s"
    timeout = "5s"
    grace_period = "10s"
    method = "GET"
    path = "/health"