name: athenax-backend

x-healthcheck-postgres-template: &postgreshealthcheck
  healthcheck:
    test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
    interval: 30s
    timeout: 10s
    retries: 5

x-healthcheck-redis-template: &redishealthcheck
  healthcheck:
    test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
    interval: 30s
    timeout: 30s
    retries: 3

x-healthcheck-app-template: &apphealthcheck
  healthcheck:
    test:
      [
        "CMD",
        "python",
        "-c",
        "import urllib.request; urllib.request.urlopen('http://127.0.0.1:' + __import__('os').environ.get('PORT', '8000') + '/health', timeout=3)",
      ]
    interval: 30s
    timeout: 10s
    retries: 5

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: athenax-be-app
    restart: unless-stopped
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      RUN_MODE: ${RUN_MODE:-prod}
      HOST: 0.0.0.0
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    command: ["sh", "./start.sh"]
    <<: *apphealthcheck

  postgres:
    image: postgres:17-alpine
    container_name: athenax-pg
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    <<: *postgreshealthcheck

  redis:
    image: redis:7-alpine
    container_name: athenax-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      [
        "sh",
        "-c",
        'redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"',
      ]
    <<: *redishealthcheck

  postgres-test:
    image: postgres:17-alpine
    container_name: athenax-pg-test
    restart: unless-stopped
    profiles: ["test"]
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_pass
      POSTGRES_DB: test_analyser_db
    <<: *postgreshealthcheck

volumes:
  postgres_data:
  postgres_test_data:
